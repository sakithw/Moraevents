<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register | MoraEvents</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container { max-width: 420px; margin: 80px auto; }
        .hidden { display: none; }
    </style>
    <script>
        const theme = localStorage.getItem('theme') || 'light';
        if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">MoraEvents</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="navbar-links">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="events.html">Browse Events</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item ms-lg-2 d-flex align-items-center">
                        <button id="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">🌙</button>
                    </li>
                    <li class="nav-item"><a class="nav-link active btn btn-primary text-white ms-lg-3 px-3" href="auth.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container">
            
            <div id="login-form">
                <div class="glass-panel p-4">
                    <h3 class="fw-bold mb-3 gradient-text text-center">Student Login</h3>
                    <form onsubmit="handleAuth(event, 'login')">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="login-email" class="form-control" placeholder="name@uni.ac.lk" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="login-pass" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Sign In</button>
                        <p class="text-center mt-3 small text-muted">New here? <a href="#" onclick="toggleAuth()">Create Account</a></p>
                    </form>
                </div>
            </div>

            <div id="register-form" class="hidden">
                <div class="glass-panel p-4">
                    <h3 class="fw-bold mb-3 gradient-text text-center">Create Account</h3>
                    <form onsubmit="handleAuth(event, 'register')">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" id="reg-name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">University Email</label>
                            <input type="email" id="reg-email" class="form-control" placeholder="id@stu.uni.ac.lk" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Create Password</label>
                            <input type="password" id="reg-pass" class="form-control" minlength="6" required>
                            <div class="form-text text-muted">Minimum 6 characters.</div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Create Account</button>
                        <p class="text-center mt-3 small text-muted">Already have an account? <a href="#" onclick="toggleAuth()">Login</a></p>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
    <script src="theme.js"></script>
</body>
</html>
