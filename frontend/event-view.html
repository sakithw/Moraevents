<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details | UniEvents</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <<a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
    <img src="https://upload.wikimedia.org/wikipedia/en/6/60/University_of_Moratuwa_logo.png" 
         alt="UoM Logo" 
         class="uni-logo me-2">
    <span>MoraEvents</span>
</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto" id="navbar-links">
                <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="events.html">Browse Events</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                <li class="nav-item"><a class="nav-link btn btn-primary text-white ms-lg-3 px-3" href="auth.html">Login</a></li>
            </ul>
        </div>
    </div>
</nav>

    <div class="container my-5">
        <div id="event-detail-content">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3 text-muted">Loading event details...</p>
            </div>
        </div>
    </div>

    <footer class="py-4 bg-dark">
        <div class="container">
            <p class="m-0 text-center text-white">Copyright &copy; UniEvents Team 2026</p>
        </div>
    </footer>

    <script src="script.js"></script>
   <script>
    window.addEventListener('load', async () => {
        const params  = new URLSearchParams(window.location.search);
        const eventId = params.get('id');
        const container = document.getElementById('event-detail-content');

        if (!eventId) {
            container.innerHTML = `<div class="alert alert-danger">No event specified. <a href="events.html">Browse Events</a></div>`;
            return;
        }

       try {
    const response = await fetch(`http://localhost:5000/api/events/${eventId}`);
    const data = await response.json();
    
    // Your backend sends { success: true, event: { ... } }
    if (data.success && data.event) {
        renderFullDetails(data.event);
    } else {
        throw new Error(data.message || "Event not found");
    }
} catch (err) {
    console.error("MoraEvents Fetch Error:", err);
    container.innerHTML = `<div class="alert alert-danger">Event not found. <a href="index.html">Back to Home</a></div>`;
}
    });

    function renderFullDetails(event) {
        const container = document.getElementById('event-detail-content');
        
        // FIX: Replaced isLoggedIn() with the actual localStorage check used in script.js
        const loggedIn = !!localStorage.getItem('token');

        container.innerHTML = `
            <div class="row">
                <div class="col-lg-8">
                    <img src="${event.img}"
                         class="img-fluid rounded shadow mb-4"
                         style="width:100%; max-height:400px; object-fit:cover;"
                         onerror="this.src='https://via.placeholder.com/400x200?text=Event+Image'">
                    <h1 class="fw-bold text-dark">${event.title}</h1>
                    <span class="badge bg-primary fs-6 mb-3">${event.category}</span>
                    <hr>
                    <h3 class="text-dark">About this Event</h3>
                    <p class="lead text-muted">${event.description || 'Join us for this exciting campus event.'}</p>
                </div>
                <div class="col-lg-4">
                    <div class="card shadow-sm border-0 p-4">
                        <h5 class="fw-bold">Event Info</h5>
                        <ul class="list-unstyled">
                            <li class="mb-2"><strong>Date:</strong> ${event.date}</li>
                            <li class="mb-2"><strong>Venue:</strong> ${event.venue}</li>
                        </ul>
                        ${loggedIn
                            ? `<button class="btn btn-success btn-lg w-100 mt-3" id="reg-btn" onclick="registerForEvent('${event._id}')">
                                   ✅ Confirm Registration
                               </button>`
                            : `<a href="auth.html" class="btn btn-warning btn-lg w-100 mt-3">Login to Register</a>`
                        }
                        <a href="events.html" class="btn btn-link w-100 mt-2">← Back to Browse</a>
                    </div>
                </div>
            </div>
        `;
    }

    async function registerForEvent(eventId) {
    const btn = document.getElementById('reg-btn');
    const token = localStorage.getItem('token'); // Get the saved token
    btn.disabled = true;
    btn.textContent = 'Registering...';
    
    try {
        const response = await fetch(`http://localhost:5000/api/events/${eventId}/register`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`, // Ensure 'Bearer' is included
                'Content-Type': 'application/json'
            }
        });
        const data = await response.json();
        if (data.success) {
            alert(data.message);
            btn.textContent = '🎉 Registered!';
            btn.classList.replace('btn-success', 'btn-secondary');
        } else {
            throw new Error(data.message);
        }
    } catch (err) {
        alert(err.message);
        btn.disabled = false;
        btn.textContent = '✅ Confirm Registration';
    }
}
</script>
</html>
